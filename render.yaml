# Render Blueprint — Deploy the entire GSSoC Issue Finder monorepo (Backend + Database + Frontend)
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: gssoc-db
    plan: free
    databaseName: gssoc_scanner
    postgresMajorVersion: "16"
    region: oregon

services:
  # 1. Backend Web Service (FastAPI)
  - type: web
    name: gssoc-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir backend
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromDatabase:
          name: gssoc-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: GITHUB_OAUTH_CLIENT_ID
        sync: false
      - key: GITHUB_OAUTH_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SCANNER_GITHUB_TOKEN
        sync: false
      - key: CACHE_TTL_SECONDS
        value: "1800"
      - key: SCAN_CONCURRENCY
        value: "3"
      - key: MAX_ISSUES_PER_REPO
        value: "500"
      - key: SCAN_STALE_SECONDS
        value: "180"
      - key: PROJECTS_JSON_PATH
        value: projects.json

  # 2. Frontend Static Site (React/Vite)
  - type: static
    name: gssoc-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://gssoc-api.onrender.com/api/*
      - type: rewrite
        source: /auth/*
        destination: https://gssoc-api.onrender.com/auth/*
      - type: rewrite
        source: /*
        destination: /index.html
